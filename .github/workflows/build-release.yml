name: Build Release

on:
  workflow_dispatch:
    inputs:
      blis_branch:
        description: 'Branch for C4G/BLIS'
        required: true
        default: 'main'
        type: string
      blisruntime_branch:
        description: 'Branch for C4G/BLISRuntime'
        required: true
        default: 'main'
        type: string
      blisng_branch:
        description: 'Branch for C4G/BLIS-NG'
        required: true
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout BLIS
        uses: actions/checkout@v4
        with:
          repository: 'C4G/BLIS'
          ref: ${{ inputs.blis_branch }}
          path: 'BLIS'
          
      - name: Checkout BLISRuntime
        uses: actions/checkout@v4
        with:
          repository: 'C4G/BLISRuntime'
          # BLISRuntime contains large binary files using Git LFS
          # https://git-lfs.com/
          lfs: true
          ref: ${{ inputs.blisruntime_branch }}
          path: 'BLISRuntime'
          
      - name: Checkout BLIS-NG
        uses: actions/checkout@v4
        with:
          repository: 'C4G/BLIS-NG'
          ref: ${{ inputs.blisng_branch }}
          path: 'BLIS-NG'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          cache: true
          cache-dependency-path: 'BLIS-NG/packages.lock.json'
          
      - name: Build BLIS-NG
        working-directory: ./BLIS-NG
        run: dotnet publish -r win-x64 -c Release

      - name: Prepare Artifact Folders
        run: |
          mkdir -p BLIS-Standalone
          
          # Copy BLISRuntime (excluding .git)
          cp -r BLISRuntime/. BLIS-Standalone/ && rm -rf BLIS-Standalone/.git
          
          # Copy BLIS (excluding .git and the legacy EXEs)
          cp -r BLIS/. BLIS-Standalone/ && rm -rf BLIS-Standalone/.git
          rm -f BLIS-Standalone/BLIS.exe BLIS-Standalone/BLIS.exe.manifest
          
          # Copy BLIS-NG executable
          cp BLIS-NG/bin/Release/net10.0/win-x64/publish/BLIS-NG.exe BLIS-Standalone/

          mkdir -p BLIS-Upgrade

          # Copy BLIS (excluding .git and local/ runtime data)
          cp -r BLIS/. BLIS-Upgrade/ && rm -rf BLIS-Upgrade/.git BLIS-Upgrade/local

          # Copy BLISRuntime server component
          cp -r BLISRuntime/server BLIS-Upgrade/server

      - name: Create Zip Archives
        run: |
          cd BLIS-Standalone && zip -r ../BLIS-Standalone.zip . && cd ..
          cd BLIS-Upgrade && zip -r ../BLIS-Upgrade.zip . && cd ..

      - name: Upload Standalone Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLIS-Standalone
          path: BLIS-Standalone.zip

      - name: Upload Upgrade Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLIS-Upgrade
          path: BLIS-Upgrade.zip
